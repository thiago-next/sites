<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Copiar</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #111827;
    color: #fff;
    padding: 16px 24px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .success {
    background: #16a34a;
  }

  .error {
    background: #dc2626;
  }
</style>

<script>
function copiarTexto() {
  const params = new URLSearchParams(window.location.search);
  const texto = params.get("texto");

  if (!texto) {
    mostrarToast("Nenhum texto recebido", "error");
    return;
  }

  navigator.clipboard.writeText(texto)
    .then(() => {
      mostrarToast("Texto copiado com sucesso!", "success");

      // voltar automaticamente depois
      setTimeout(() => {
        history.back();
      }, 1200);
    })
    .catch(() => {
      mostrarToast("Falha ao copiar. Toque e segure para copiar.", "error");
    });
}

function mostrarToast(mensagem, tipo) {
  const toast = document.getElementById("toast");
  toast.innerText = mensagem;
  toast.className = "toast show " + tipo;

  setTimeout(() => {
    toast.className = "toast";
  }, 3000);
}
</script>

</head>

<body onload="copiarTexto()">

<div id="toast" class="toast"></div>

</body>
</html>
