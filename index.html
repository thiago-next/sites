<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>...</title>

<style>
  body {
    margin: 0;
    background: #ffffff;
  }
</style>

<script>
function copiar() {
  const params = new URLSearchParams(window.location.search);
  const texto = params.get("texto");

  if (!texto) {
    voltar();
    return;
  }

  navigator.clipboard.writeText(texto)
    .then(() => {
      voltar();
    })
    .catch(() => {
      fallback(texto);
    });
}

function fallback(texto) {
  // cria campo invisível para forçar cópia
  const input = document.createElement("textarea");
  input.value = texto;
  document.body.appendChild(input);
  input.select();
  document.execCommand("copy");
  document.body.removeChild(input);

  voltar();
}

function voltar() {
  setTimeout(() => {
    history.back();
  }, 100);
}
</script>

</head>

<body onload="copiar()">
</body>
</html>
