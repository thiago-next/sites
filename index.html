<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copiar</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .box {
    text-align: center;
  }

  button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #111827;
    color: white;
    font-size: 14px;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #111827;
    color: #fff;
    padding: 16px 24px;
    border-radius: 12px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .success { background: #16a34a; }
  .error { background: #dc2626; }
</style>

<script>
let textoGlobal = "";

function copiarTexto() {
  if (!textoGlobal) return;

  navigator.clipboard.writeText(textoGlobal)
    .then(() => {
      mostrarToast("✅ Copiado com sucesso!", "success");

      setTimeout(() => {
        history.back();
      }, 1200);
    })
    .catch(() => {
      mostrarToast("⚠ Clique no botão para copiar", "error");
      document.getElementById("btn").style.display = "block";
    });
}

function mostrarToast(msg, tipo) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.className = "toast show " + tipo;

  setTimeout(() => {
    toast.className = "toast";
  }, 3000);
}

function init() {
  const params = new URLSearchParams(window.location.search);
  textoGlobal = params.get("texto");

  if (!textoGlobal) {
    mostrarToast("Nenhum texto recebido", "error");
    return;
  }

  copiarTexto();
}
</script>

</head>

<body onload="init()">

<div class="box">
  <h3>Copiar texto</h3>
  <button id="btn" onclick="copiarTexto()" style="display:none;">
    Copiar manualmente
  </button>
</div>

<div id="toast" class="toast"></div>

</body>
</html>
